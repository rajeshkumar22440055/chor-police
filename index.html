<script>
    let currentLevel = 1;
    let map = [];
    const gridSize = 9;
    let chorPos = { x: 1, y: 1 };
    let policePos = { x: 7, y: 7 };
    let diamondsLeft = 0;
    let totalCoins = parseInt(localStorage.getItem("userCoins")) || 0;
    let gameOver = false;
    let freezeTurns = 0;
    let rageTurns = 0;

    const gridElement = document.getElementById('grid');
    const statusElement = document.getElementById('status');
    const levelIndicator = document.getElementById('level-indicator');

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        currentLevel = parseInt(localStorage.getItem("savedChorPoliceLevel")) || 1;
        startLevel(currentLevel);
    }

    function startLevel(levelNum) {
        // Ye map generator function aapka waisa hi rahega jaisa pehle tha
        map = generateProceduralLevel(levelNum); 
        gameOver = false;
        freezeTurns = 0;
        rageTurns = 0;
        levelIndicator.innerText = `LEVEL: ${levelNum}`;
        updateStatus();
        drawMap();
    }

    function handleMove(dx, dy) {
        if (gameOver) return;
        let nextX = chorPos.x + dx;
        let nextY = chorPos.y + dy;
        
        if (nextX < 0 || nextX >= gridSize || nextY < 0 || nextY >= gridSize || map[nextY][nextX] === 1) return;
        
        chorPos.x = nextX;
        chorPos.y = nextY;

        // Coin aur Booster logic
        if (map[chorPos.y][chorPos.x] === 'D') { map[chorPos.y][chorPos.x] = 0; diamondsLeft--; totalCoins += 10; }
        if (map[chorPos.y][chorPos.x] === 'B') { map[chorPos.y][chorPos.x] = 0; freezeTurns = 5; }

        // Police Turn Logic (Turn-based)
        if (!gameOver) {
            if (freezeTurns > 0) {
                freezeTurns--;
            } else {
                if (rageTurns > 0) {
                    movePoliceLogic();
                    movePoliceLogic();
                    rageTurns--;
                } else {
                    movePoliceLogic();
                }
            }
        }
        updateStatus();
        drawMap();
    }

    function movePoliceLogic() {
        if (gameOver) return;
        // Check Red Dot for Speed Increase
        if (map[policePos.y] && map[policePos.y][policePos.x] === 'P') {
            map[policePos.y][policePos.x] = 0;
            rageTurns = 2;
        }

        let diffX = chorPos.x - policePos.x;
        let diffY = chorPos.y - policePos.y;
        policePos.x += (Math.abs(diffX) > Math.abs(diffY)) ? Math.sign(diffX) : 0;
        policePos.y += (Math.abs(diffX) > Math.abs(diffY)) ? 0 : Math.sign(diffY);
        checkCollision();
    }

    function checkCollision() {
        if (policePos.x === chorPos.x && policePos.y === chorPos.y) {
            if (totalCoins >= 100) {
                if (confirm("🚨 Pakde gaye! 100 coins dekar revive karein?")) {
                    totalCoins -= 100;
                    localStorage.setItem("userCoins", totalCoins);
                    policePos = { x: 7, y: 7 };
                    return;
                }
            }
            gameOver = true;
            statusElement.innerText = "🚨 GAME OVER!";
        }
    }

    function updateStatus() {
        statusElement.innerText = `💎: ${diamondsLeft} | 💰: ${totalCoins} | Lvl: ${currentLevel}`;
    }

    function drawMap() {
        if(!gridElement) return;
        gridElement.innerHTML = '';
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if (map[r][c] === 1) cell.classList.add('wall');
                if (r === chorPos.y && c === chorPos.x) cell.classList.add('chor');
                if (r === policePos.y && c === policePos.x) {
                    cell.classList.add('police');
                    cell.innerHTML = (rageTurns > 0) ? '😡' : '👮';
                }
                gridElement.appendChild(cell);
            }
        }
    }
</script>
